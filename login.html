<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लॉगिन | SUCCESS COACHING CENTRE</title>
    <style>
        /* सिर्फ लॉगिन पेज के लिए स्टाइल */
        body { background: #0f0f0f; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-container { background: #1a1a1a; padding: 30px; border-radius: 15px; width: 350px; text-align: center; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; }
        button { width: 95%; padding: 12px; border-radius: 8px; border: none; background: #007bff; color: white; cursor: pointer; }
        h2 { color: #007bff; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>SUCCESS COACHING</h2>
        <p>अपनी कोचिंग यात्रा शुरू करें</p>

        <div id="login-form">
            <input type="tel" id="phone-number" placeholder="मोबाइल नंबर (10 अंक)" required>
            <div id="recaptcha-container"></div>
            <button id="send-otp-btn">OTP भेजें</button>
        </div>

        <div id="otp-form" style="display:none;">
            <input type="text" id="otp-code" placeholder="6 अंकों का OTP (टेस्टिंग: 000000)" maxlength="6">
            <button id="verify-otp-btn">वेरिफाई करें</button>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        // ... (आपका वही लॉजिक जो पहले था) ...
        // बस verify-otp-btn वाले में वो '000000' वाला बाईपास लगा लें।
        
        document.getElementById("verify-otp-btn").addEventListener("click", async () => {
            const code = document.getElementById("otp-code").value;
            if(code === "000000") { window.location.href = "dashboard.html"; return; }
            
            try {
                await window.confirmationResult.confirm(code);
                window.location.href = "dashboard.html";
            } catch(e) { alert("गलत OTP!"); }
        });
    </script>
</body>
</html>
