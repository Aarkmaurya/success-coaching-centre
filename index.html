<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUCCESS - AARK PROTOCOL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- पेज ट्रांजिशन के लिए wrapper -->
    <div class="page-fade">
        
        <!-- कार्ड के अंदर कंटेंट - यहाँ हमने पुरानी ID/Classes को सुरक्षित रखा है -->
        <div class="glass-card" style="max-width: 400px; margin: 100px auto; text-align: center;">
            <h2 class="glow-text">SUCCESS COACHING CENTRE</h2>
            <p style="font-size: 0.8rem; color: var(--neon-purple); margin-bottom: 20px;">FOR REGISTRATION: AARK PROTOCOL</p>
            
            <!-- यहाँ input fields में IDs बनी हुई हैं, इन्हें न बदलें क्योंकि JS में इनकी जरूरत है -->
            <input type="text" id="phone-number" placeholder="Enter your mobile number...">
            <br><br>
            <input type="text" id="otp-code" placeholder="Enter encrypted OTP...">
            <br><br>
            
            <!-- Button पर glass-btn क्लास जोड़ दी है, लॉजिक के लिए ID वही रखी है -->
            <button id="send-otp-btn" class="glass-btn" style="width: 100%; justify-content: center;">
                REQUEST OTP / REGISTER
            </button>
            
            <!-- रिकाप्चा के लिए जरूरी कंटेनर (इसे न हटाएं) -->
            <div id="recaptcha-container" style="margin-top: 10px;"></div>
            
            <p style="margin-top: 20px; font-size: 0.7rem; opacity: 0.7;">
                SYS STATUS: ACTIVE | NETWORK: ENCRYPTED
            </p>
        </div>

    </div>

    <!-- Firebase SDK और app.js लोड करें (यह आपके पुराने लॉजिक को चलाएगा) -->
    <script src="app.js" type="module"></script>
</body>
</html>
