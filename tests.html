<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ऑनलाइन टेस्ट | SUCCESS COACHING CENTRE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="sidebar">
        <h2>SUCCESS COACHING</h2>
        <ul>
            <li><a href="dashboard.html">डैशबोर्ड</a></li>
            <li><a href="notes.html">स्टडी नोट्स</a></li>
            <li><a href="tests.html" class="active">ऑनलाइन टेस्ट</a></li>
            <li><a href="profile.html">प्रोफाइल</a></li>
        </ul>
    </div>

    <main class="content">
        <header>
            <h1>उपलब्ध टेस्ट</h1>
            <p>अपनी तैयारी जांचें</p>
        </header>

        <section class="test-grid" id="test-container">
            <div class="test-card">
                <h3>गणित - NVS प्रवेश परीक्षा</h3>
                <p>समय: 60 मिनट | प्रश्न: 50</p>
                <button class="btn-start" onclick="startTest('test-id-001')">टेस्ट शुरू करें</button>
            </div>
        </section>

        <div id="exam-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <div class="exam-header">
                    <h2 id="test-title">टेस्ट का नाम</h2>
                    <div id="timer">समय: 60:00</div>
                </div>
                <div id="question-area">
                    </div>
                <button class="btn-submit" onclick="confirmSubmit()">टेस्ट सबमिट करें</button>
            </div>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
    <script>
        function confirmSubmit() {
            if(confirm("क्या आप वाकई टेस्ट सबमिट करना चाहते हैं?")) {
                // यहाँ सबमिशन का लॉजिक आएगा
                alert("टेस्ट सफलतापूर्वक सबमिट हो गया!");
                window.location.reload();
            }
        }
    </script>
</body>
</html>
