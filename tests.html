<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ऑनलाइन टेस्ट | SUCCESS COACHING CENTRE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">SUCCESS COACHING</div>
        <ul>
            <li><a href="dashboard.html">डैशबोर्ड</a></li>
            <li><a href="notes.html">स्टडी नोट्स</a></li>
            <li><a href="tests.html">ऑनलाइन टेस्ट</a></li>
            <li><a href="profile.html">प्रोफाइल</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <main class="content page-fade">
        <header style="margin-bottom: 30px;">
            <h1 class="glow-text">उपलब्ध टेस्ट</h1>
            <p style="opacity: 0.7;">अपनी तैयारी जांचें</p>
        </header>

        <!-- Test Grid: अब glass-card का उपयोग -->
        <section class="test-grid" id="test-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
            <div class="test-card glass-card">
                <h3>गणित - NVS प्रवेश परीक्षा</h3>
                <p style="margin: 10px 0; opacity: 0.8;">समय: 60 मिनट | प्रश्न: 50</p>
                <button class="glass-btn" onclick="startTest('test-id-001')">टेस्ट शुरू करें</button>
            </div>
        </section>

        <!-- Modal: यह भी अब Glass-UI में है -->
        <div id="exam-modal" class="modal" style="display:none;">
            <div class="modal-content glass-card" style="width: 90%; max-width: 600px;">
                <div class="exam-header" style="border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 15px;">
                    <h2 id="test-title">टेस्ट का नाम</h2>
                    <div id="timer" style="color: var(--neon-blue); font-weight: bold;">समय: 60:00</div>
                </div>
                <div id="question-area" style="min-height: 200px;">
                    <!-- यहाँ प्रश्न लोड होंगे -->
                </div>
                <button class="glass-btn" style="margin-top: 20px; width: 100%;" onclick="confirmSubmit()">
                    टेस्ट सबमिट करें
                </button>
            </div>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
    <script>
        // आपका मूल लॉजिक सुरक्षित है
        function confirmSubmit() {
            if(confirm("क्या आप वाकई टेस्ट सबमिट करना चाहते हैं?")) {
                alert("टेस्ट सफलतापूर्वक सबमिट हो गया!");
                window.location.reload();
            }
        }
    </script>
</body>
</html>
