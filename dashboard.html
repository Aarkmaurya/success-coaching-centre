<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SUCCESS COACHING CENTRE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="sidebar">
        <h2>SUCCESS COACHING</h2>
        <ul>
            <li><a href="dashboard.html">डैशबोर्ड</a></li>
            <li><a href="notes.html">स्टडी नोट्स</a></li>
            <li><a href="tests.html">ऑनलाइन टेस्ट</a></li>
            <li><a href="profile.html">प्रोफाइल</a></li>
            <li><a href="#" id="logout-btn">लॉग आउट</a></li>
        </ul>
    </div>

    <main class="content">
        <header>
            <h1>नमस्ते, <span id="student-name">विद्यार्थी</span>!</h1>
            <p>आपकी प्रगति का विवरण यहाँ है:</p>
        </header>

        <section class="stats-grid">
            <div class="card">
                <h3>औसत स्कोर</h3>
                <p id="avg-score">0%</p>
            </div>
            <div class="card">
                <h3>कुल टेस्ट</h3>
                <p id="total-tests">0</p>
            </div>
            <div class="card">
                <h3>उपस्थिति</h3>
                <p id="attendance">0%</p>
            </div>
        </section>

        <section class="recent-activity">
            <h3>हालिया गतिविधियाँ</h3>
            <ul id="activity-list">
                <li>नया टेस्ट उपलब्ध: NVS गणित</li>
                <li>आपने 'विज्ञान' टेस्ट पूरा किया</li>
            </ul>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
    <script type="module">
        // बेसिक रेंडरिंग लॉजिक
        import { auth } from './js/firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "index.html");
        });
    </script>
</body>
</html>
