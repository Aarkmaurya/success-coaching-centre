<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>स्टडी नोट्स | SUCCESS COACHING CENTRE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="sidebar">
        <h2>SUCCESS COACHING</h2>
        <ul>
            <li><a href="dashboard.html">डैशबोर्ड</a></li>
            <li><a href="notes.html" class="active">स्टडी नोट्स</a></li>

    <main class="content">
        <header>
            <h1>स्टडी मटेरियल</h1>
            <p>अपनी कक्षा और कोर्स के अनुसार नोट्स चुनें:</p>
        </header>

        <section class="filter-section">
            <select id="course-filter">

                <div class="actions">

    <script type="module" src="js/app.js"></script>
    <script type="module">
        // बेसिक फिल्टर लॉजिक
        const filter = document.getElementById('course-filter');
        filter.addEventListener('change', (e) => {
            const selectedCourse = e.target.value;
            console.log("फिल्टरिंग कोर्स: ", selectedCourse);
            // यहाँ Firestore से डेटा री-फेच करने का लॉजिक आएगा
        });
    </script>
</body>
